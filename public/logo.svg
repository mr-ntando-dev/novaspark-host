<svg width="192" height="192" viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c7d2fe"/>
      <stop offset="100%" style="stop-color:#e9d5ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" fill="#080712" rx="24"/>
  <!-- Ambient glow -->
  <ellipse cx="96" cy="82" rx="60" ry="50" fill="#6366f1" opacity="0.08"/>
  <!-- Outer hex ring -->
  <polygon points="96,18 144,46 144,102 96,130 48,102 48,46" fill="none" stroke="url(#hexGrad)" stroke-width="1.5" opacity="0.5"/>
  <!-- Hex fill -->
  <polygon points="96,24 138,48 138,96 96,120 54,96 54,48" fill="#0e0b1f"/>
  <!-- Grid lines -->
  <line x1="96" y1="24" x2="96" y2="120" stroke="#6366f1" stroke-width="0.4" opacity="0.15"/>
  <line x1="54" y1="48" x2="138" y2="96" stroke="#6366f1" stroke-width="0.4" opacity="0.15"/>
  <line x1="138" y1="48" x2="54" y2="96" stroke="#6366f1" stroke-width="0.4" opacity="0.15"/>
  <!-- Corner dots -->
  <circle cx="96" cy="24" r="2" fill="#6366f1" opacity="0.9"/>
  <circle cx="138" cy="48" r="2" fill="#a855f7" opacity="0.9"/>
  <circle cx="138" cy="96" r="2" fill="#ec4899" opacity="0.9"/>
  <circle cx="96" cy="120" r="2" fill="#6366f1" opacity="0.9"/>
  <circle cx="54" cy="96" r="2" fill="#a855f7" opacity="0.9"/>
  <circle cx="54" cy="48" r="2" fill="#ec4899" opacity="0.9"/>
  <!-- Lightning bolt -->
  <polygon points="91,36 79,70 91,70 78,104 113,68 100,68 108,36" fill="url(#hexGrad)" filter="url(#glow)" opacity="0.95"/>
  <!-- Separator -->
  <line x1="58" y1="132" x2="134" y2="132" stroke="url(#hexGrad)" stroke-width="0.8" opacity="0.6"/>
  <!-- NVS HOST text -->
  <text x="96" y="148" font-family="Arial Black, Impact, sans-serif" font-size="13" font-weight="900" letter-spacing="3" text-anchor="middle" fill="url(#textGrad)">NVS HOST</text>
  <!-- Dots -->
  <circle cx="82" cy="164" r="1.5" fill="#6366f1" opacity="0.5"/>
  <circle cx="96" cy="164" r="1.5" fill="#a855f7" opacity="0.5"/>
  <circle cx="110" cy="164" r="1.5" fill="#ec4899" opacity="0.5"/>
</svg>
