services:
  - type: web
    name: novaspark-v13
    runtime: node
    buildCommand: npm install --production --omit=dev
    startCommand: node --expose-gc --max-old-space-size=450 server.js
    plan: free
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # IMPORTANT: Set RENDER_URL to your service URL after first deploy
      # e.g. https://novaspark-v13.onrender.com
      # This enables the keep-alive ping that prevents Render from spinning down
      - key: RENDER_URL
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: BOT_MAX_RAM_MB
        value: "350"
      - key: BOT_RAM_KILL_THRESHOLD_MB
        value: "400"
      - key: MAX_BOTS_GLOBAL
        value: "100"
